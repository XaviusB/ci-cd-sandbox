---
- name: Install dependencies
  ansible.builtin.apt:
    name: "{{ gitea_dependencies }}"
    state: present
    update_cache: true
    cache_valid_time: 86400
  become: true

- name: Create git user
  ansible.builtin.user:
    name: "{{ gitea_user }}"
    comment: "Git Version Control"
    home: "{{ gitea_home }}"
    shell: /bin/bash
    system: true
    create_home: true
  become: true

- name: Ensure MariaDB is started and enabled
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
  become: true

- name: Create Gitea database
  community.mysql.mysql_db:
    name: "{{ gitea_db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: true

- name: Create Gitea database user
  community.mysql.mysql_user:
    name: "{{ gitea_db_user }}"
    password: "{{ gitea_db_password }}"
    priv: "{{ gitea_db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: true

- name: Create Gitea directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ gitea_data_dir }}/custom", owner: "{{ gitea_user }}", group: "{{ gitea_group }}", mode: "0755" }
    - { path: "{{ gitea_data_dir }}/data", owner: "{{ gitea_user }}", group: "{{ gitea_group }}", mode: "0755" }
    - { path: "{{ gitea_data_dir }}/log", owner: "{{ gitea_user }}", group: "{{ gitea_group }}", mode: "0755" }
    - { path: "{{ gitea_config_dir }}", owner: "root", group: "{{ gitea_group }}", mode: "0750" }
  become: true

- name: Check if Gitea binary exists
  ansible.builtin.stat:
    path: "{{ gitea_install_dir }}/gitea"
  register: gitea_binary

- name: Get current Gitea version
  ansible.builtin.command:
    cmd: "{{ gitea_install_dir }}/gitea --version"
  register: gitea_current_version
  changed_when: false
  failed_when: false
  when: gitea_binary.stat.exists

- name: Extract version number
  ansible.builtin.set_fact:
    gitea_installed_version: "{{ gitea_current_version.stdout | regex_search('gitea version ([\\d.]+)', '\\1') | first | default('') }}"
  when: gitea_binary.stat.exists and gitea_current_version.rc == 0

- name: Stop Gitea service before upgrade
  ansible.builtin.service:
    name: gitea
    state: stopped
  become: true
  when:
    - gitea_binary.stat.exists
    - gitea_installed_version is defined
    - gitea_installed_version != gitea_version
  failed_when: false

- name: Download Gitea binary
  ansible.builtin.get_url:
    url: "https://dl.gitea.com/gitea/{{ gitea_version }}/gitea-{{ gitea_version }}-linux-amd64"
    dest: "{{ gitea_install_dir }}/gitea"
    mode: '0755'
    owner: root
    group: root
  become: true
  when: >
    not gitea_binary.stat.exists or
    (gitea_installed_version is defined and gitea_installed_version != gitea_version)
  notify: Restart gitea

- name: Create Gitea systemd service
  ansible.builtin.template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart gitea

- name: Create Gitea configuration
  ansible.builtin.template:
    src: gitea.ini.j2
    dest: "{{ gitea_config_dir }}/gitea.ini"
    owner: root
    group: "{{ gitea_group }}"
    mode: '0640'
  become: true
  notify: Restart gitea

- name: Flush handlers to ensure Gitea is running
  ansible.builtin.meta: flush_handlers

- name: Enable Gitea service
  ansible.builtin.service:
    name: gitea
    enabled: true
  become: true

- name: Wait for Gitea to be available
  ansible.builtin.uri:
    url: "http://localhost:{{ gitea_http_port }}/"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 3
  changed_when: false

- name: Check if admin user exists
  ansible.builtin.command:
    cmd: sudo -u {{ gitea_user }} {{ gitea_install_dir }}/gitea admin user list --config {{ gitea_config_dir }}/gitea.ini
  register: gitea_users
  changed_when: false
  failed_when: false
  become: true

- name: Generate random admin password
  ansible.builtin.set_fact:
    gitea_generated_password: "{{ lookup('password', '/dev/null length=' ~ gitea_admin_password_length ~ ' chars=ascii_letters,digits') }}"
  when: gitea_admin_password == ""
  no_log: true

- name: Set admin password
  ansible.builtin.set_fact:
    gitea_password_to_use: "{{ gitea_admin_password if gitea_admin_password != '' else gitea_generated_password }}"
  no_log: true

- name: Create Gitea admin user
  ansible.builtin.command:
    cmd: >
      sudo -u {{ gitea_user }} {{ gitea_install_dir }}/gitea admin user create
      --username {{ gitea_admin_user }}
      --password {{ gitea_password_to_use }}
      --admin
      --email {{ gitea_admin_email }}
      --config {{ gitea_config_dir }}/gitea.ini
  register: admin_created
  changed_when: "'New user' in admin_created.stdout"
  failed_when: admin_created.rc != 0 and 'user already exists' not in admin_created.stderr
  become: true
  no_log: true
  when: gitea_admin_user not in gitea_users.stdout

- name: Export admin credentials to artifacts
  ansible.builtin.copy:
    content: "{{ gitea_admin_user }}:{{ gitea_password_to_use }}\n"
    dest: "{{ artifacts_dir }}/gitea-admin-credentials.txt"
    mode: '0600'
  become: true
  when:
    - gitea_export_credentials | bool
    - admin_created.changed
  no_log: true

- name: Generate runner registration token
  ansible.builtin.shell: |
    sudo -u {{ gitea_user }} {{ gitea_install_dir }}/gitea actions generate-runner-token --config {{ gitea_config_dir }}/gitea.ini
  register: runner_token
  changed_when: true
  become: true
  when: gitea_generate_runner_token | bool

- name: Export runner token to artifacts
  ansible.builtin.copy:
    content: "{{ runner_token.stdout }}\n"
    dest: "{{ artifacts_dir }}/gitea-runner-token.txt"
    mode: '0600'
  become: true
  when:
    - gitea_generate_runner_token | bool
    - runner_token is defined
    - runner_token.stdout is defined

# Backup configuration
- name: Create backup directory
  ansible.builtin.file:
    path: "{{ gitea_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  when: gitea_enable_backup | bool

- name: Copy backup script
  ansible.builtin.copy:
    src: backup-gitea.sh
    dest: /usr/local/bin/backup-gitea.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  when: gitea_enable_backup | bool

- name: Copy restore script
  ansible.builtin.copy:
    src: restore-gitea.sh
    dest: /usr/local/bin/restore-gitea.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  when: gitea_enable_backup | bool

- name: Install rsync for backup
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: true
  become: true
  when: gitea_enable_backup | bool

- name: Set up backup cronjob
  ansible.builtin.cron:
    name: "Gitea daily backup"
    minute: "{{ gitea_backup_cron_minute }}"
    hour: "{{ gitea_backup_cron_hour }}"
    job: "/usr/local/bin/backup-gitea.sh >> /var/log/gitea-backup.log 2>&1"
    user: root
    state: present
  become: true
  when: gitea_enable_backup | bool
